<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Метки — Fluent Emoji Flat пикер</title>
<style>
/* ============ Restoplace tag modal — styles ============ */

:root {
  --rp-bg: #f5f5f7;
  --rp-text: #1a1d24;
  --rp-muted: #8a8f98;
  --rp-line: #e6e7ec;
  --rp-pink: #D63384;
  --rp-pink-soft: #fce4ef;
  --rp-green: #2DB856;
  --rp-red: #e0576a;
  --rp-radius: 12px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  color: var(--rp-text);
  background: #fff;
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
}

/* ============ Dim host background ============ */
.rp-backdrop {
  position: fixed; inset: 0;
  background: rgba(18, 22, 32, 0.55);
  z-index: 10;
}

/* ============ Modal shell ============ */
.rp-modal-shell {
  position: relative;
  width: 100%;
  min-height: 100%;
  padding: 48px 16px 64px;
  display: flex;
  justify-content: center;
}
.rp-modal {
  position: relative;
  width: 720px;
  max-width: 100%;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 24px 60px rgba(18,22,32,.2), 0 2px 6px rgba(18,22,32,.08);
  padding: 28px 36px 36px;
}
.rp-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 32px; height: 32px;
  border: 0; background: transparent;
  color: #b1b5be;
  cursor: pointer;
  border-radius: 8px;
  display: grid; place-items: center;
}
.rp-close:hover { color: #6b6f78; background: #f2f3f6; }

.rp-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .06em;
  color: #2b2f38;
  margin: 0 0 22px;
  text-transform: uppercase;
}

/* ============ Sections ============ */
.rp-section { margin-bottom: 28px; }
.rp-section-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.rp-section-head h3 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: #2b2f38;
}

.rp-rows { display: flex; flex-direction: column; gap: 8px; }

/* ============ Row ============ */
.rp-row {
  display: grid;
  grid-template-columns: 14px 1fr auto auto 28px;
  align-items: center;
  gap: 12px;
  padding: 2px 0;
}
.rp-row-add {
  cursor: pointer;
}
.rp-row-add:hover .rp-input { border-color: #c7cbd2; }

/* Drag handle */
.rp-drag {
  display: grid;
  grid-template-columns: repeat(2, 3px);
  grid-template-rows: repeat(3, 3px);
  gap: 2px;
  cursor: grab;
}
.rp-drag span { background: #c7cbd2; border-radius: 50%; width: 3px; height: 3px; }

/* Input cluster */
.rp-input {
  position: relative;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px 0 12px;
  height: 44px;
  border: 1.5px solid #e0e2e8;
  border-radius: 10px;
  background: #fff;
  transition: border-color .15s;
}
.rp-input:focus-within { border-color: var(--rp-pink); }
.rp-input input {
  flex: 1;
  border: 0; outline: 0; background: transparent;
  font-size: 15px; font-family: inherit;
  color: var(--rp-text);
}
.rp-input.simple { padding-left: 14px; }

.rp-icon-btn {
  width: 26px; height: 26px;
  border: 0; background: transparent;
  display: grid; place-items: center;
  cursor: default;
  padding: 0;
  border-radius: 6px;
  flex-shrink: 0;
}
.rp-icon-btn.editable { cursor: pointer; }
.rp-icon-btn.editable:hover { background: var(--rp-pink-soft); }
.rp-icon-btn.empty {
  border: 1.5px dashed #c7cbd2;
}
.rp-icon-btn.add { width: 22px; height: 22px; }
.rp-emoji {
  font-size: 20px;
  line-height: 1;
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif;
}
.rp-icon-placeholder {
  font-size: 13px;
  font-weight: 600;
  color: #b1b5be;
}

.rp-add-label {
  font-size: 15px;
  color: #7a7f88;
}
.rp-add-inline {
  display: flex; align-items: center; gap: 8px;
  color: #7a7f88;
  font-size: 15px;
}

/* Toggle switch */
.rp-toggle {
  position: relative;
  width: 44px; height: 24px;
  border-radius: 999px;
  border: 0;
  background: #d3d6dc;
  cursor: pointer;
  transition: background .18s;
  padding: 0;
}
.rp-toggle.on { background: var(--rp-pink); }
.rp-toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
  transition: transform .18s;
}
.rp-toggle.on .rp-toggle-thumb { transform: translateX(20px); }

.rp-toggle-label {
  font-size: 13px;
  font-weight: 600;
  color: #6b6f78;
  min-width: 34px;
  letter-spacing: .02em;
}

.rp-trash {
  border: 0; background: transparent; cursor: pointer;
  color: #b1b5be;
  padding: 4px;
  border-radius: 6px;
}
.rp-trash:hover { color: var(--rp-red); background: #fdeef1; }
.rp-trash-placeholder { display: block; width: 26px; }

/* ================================================================
   VARIANT A — POPOVER
================================================================ */
.picker-pop {
  position: absolute;
  width: 340px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 16px 48px rgba(18,22,32,.28), 0 2px 6px rgba(0,0,0,.08);
  border: 1px solid var(--rp-line);
  z-index: 50;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.pop-head {
  padding: 12px 12px 8px;
  border-bottom: 1px solid var(--rp-line);
  display: flex;
  align-items: center;
  gap: 8px;
}
.pop-search {
  flex: 1;
  min-width: 0;
  padding: 8px 12px;
  border: 1px solid #e0e2e8;
  border-radius: 8px;
  font: inherit;
  font-size: 14px;
  outline: 0;
}
.pop-search:focus { border-color: var(--rp-pink); }
.pop-close {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border: 0;
  background: transparent;
  color: #b1b5be;
  border-radius: 6px;
  cursor: pointer;
  display: grid;
  place-items: center;
}
.pop-close:hover { color: #4b4f58; background: #f2f3f6; }

.pop-tabs {
  display: flex;
  gap: 2px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--rp-line);
  overflow-x: auto;
}
.pop-tab {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border: 0; background: transparent;
  border-radius: 6px;
  cursor: pointer;
  display: grid; place-items: center;
  opacity: .6;
  font-size: 18px;
}
.pop-tab:hover { background: #f2f3f6; opacity: 1; }
.pop-tab.active {
  background: var(--rp-pink-soft);
  opacity: 1;
}
.pop-tab-glyph {
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
}

.pop-grid-wrap {
  max-height: 260px;
  overflow-y: auto;
  padding: 8px;
}
.pop-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
}
.pop-cell {
  aspect-ratio: 1;
  border: 0; background: transparent;
  border-radius: 6px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 20px;
}
.pop-cell:hover { background: var(--rp-pink-soft); transform: scale(1.1); }
.pop-glyph {
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  line-height: 1;
}
.pop-empty { padding: 32px; text-align: center; color: var(--rp-muted); font-size: 14px; }

.pop-foot {
  padding: 8px 12px;
  border-top: 1px solid var(--rp-line);
  font-size: 11px;
  color: var(--rp-muted);
  display: flex;
  justify-content: space-between;
}
.pop-hint { opacity: .7; }

/* ================================================================
   VARIANT B — TOP TABS MODAL
================================================================ */
.picker-tabs-backdrop {
  position: fixed; inset: 0;
  background: rgba(18,22,32,.4);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.picker-tabs {
  width: 640px; max-width: 100%;
  max-height: 90vh;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 24px 60px rgba(18,22,32,.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.tabs-head {
  padding: 18px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--rp-line);
}
.tabs-title { font-weight: 600; font-size: 15px; }
.tabs-subtitle { color: var(--rp-muted); font-weight: 400; margin-left: 4px; }
.tabs-close {
  border: 0; background: transparent; cursor: pointer;
  font-size: 24px; color: #b1b5be;
  width: 32px; height: 32px; border-radius: 8px;
  display: grid; place-items: center;
}
.tabs-close:hover { color: #6b6f78; background: #f2f3f6; }

.tabs-search {
  position: relative;
  margin: 14px 20px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  height: 40px;
  border: 1.5px solid #e0e2e8;
  border-radius: 10px;
  transition: border-color .15s;
}
.tabs-search:focus-within { border-color: var(--rp-pink); }
.tabs-search input {
  flex: 1;
  border: 0; outline: 0; background: transparent;
  font: inherit; font-size: 14px;
}
.tabs-clear {
  border: 0; background: #e8eaf0; color: #6b6f78;
  width: 20px; height: 20px;
  border-radius: 50%; cursor: pointer;
  display: grid; place-items: center;
}

.tabs-tabs {
  display: flex;
  gap: 4px;
  padding: 4px 20px 14px;
  overflow-x: auto;
  border-bottom: 1px solid var(--rp-line);
}
.tabs-tab {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border: 0;
  background: transparent;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
  color: #6b6f78;
  white-space: nowrap;
}
.tabs-tab:hover { background: #f2f3f6; color: var(--rp-text); }
.tabs-tab.active { background: var(--rp-pink); color: #fff; }
.tabs-tab.active .tabs-tab-name { color: #fff; }
.tabs-tab-glyph { font-size: 15px; }

.tabs-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 8px 20px 20px;
}
.tabs-section { margin-bottom: 16px; }
.tabs-section-head {
  padding: 12px 0 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--rp-muted);
  text-transform: uppercase;
  letter-spacing: .06em;
}
.tabs-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 2px;
}
.tabs-cell {
  aspect-ratio: 1;
  border: 0; background: transparent;
  border-radius: 8px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 24px;
  transition: transform .1s, background .1s;
}
.tabs-cell:hover { background: var(--rp-pink-soft); transform: scale(1.15); }
.tabs-glyph {
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  line-height: 1;
}
.tabs-empty {
  padding: 24px; text-align: center;
  color: var(--rp-muted); font-size: 14px;
}
.tabs-foot {
  padding: 10px 20px;
  border-top: 1px solid var(--rp-line);
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--rp-muted);
}
.tabs-foot-hint { opacity: .7; }

/* ================================================================
   VARIANT C — SIDEBAR
================================================================ */
.picker-sidebar-backdrop {
  position: fixed; inset: 0;
  background: rgba(18,22,32,.45);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.picker-sidebar {
  width: 780px; max-width: 100%;
  height: 600px; max-height: 90vh;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 24px 60px rgba(18,22,32,.3);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-head {
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--rp-line);
}
.sb-title { font-weight: 600; font-size: 15px; }
.sb-title span { color: var(--rp-pink); margin-left: 4px; }
.sb-close {
  border: 0; background: transparent; cursor: pointer;
  font-size: 24px; color: #b1b5be;
  width: 32px; height: 32px; border-radius: 8px;
}
.sb-close:hover { color: #6b6f78; background: #f2f3f6; }

.sb-body {
  flex: 1;
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 0;
}
.sb-nav {
  border-right: 1px solid var(--rp-line);
  display: flex; flex-direction: column;
  background: #fafbfc;
  min-height: 0;
}
.sb-search { padding: 12px; }
.sb-search input {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid #e0e2e8;
  border-radius: 8px;
  font: inherit; font-size: 13px;
  outline: 0;
  background: #fff;
}
.sb-search input:focus { border-color: var(--rp-pink); }
.sb-nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}
.sb-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 10px;
  border: 0;
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  color: #3b3f48;
  text-align: left;
  margin-bottom: 1px;
}
.sb-nav-item:hover { background: #eef0f4; }
.sb-nav-item.active {
  background: var(--rp-pink-soft);
  color: var(--rp-pink);
  font-weight: 500;
}
.sb-nav-glyph { font-size: 16px; }
.sb-nav-name { flex: 1; }
.sb-nav-count {
  font-size: 11px; color: var(--rp-muted);
  font-variant-numeric: tabular-nums;
}
.sb-nav-item.active .sb-nav-count { color: var(--rp-pink); opacity: .7; }

.sb-main {
  overflow-y: auto;
  padding: 0 20px 20px;
}
.sb-section { }
.sb-section-head.sticky {
  position: sticky; top: 0;
  background: #fff;
  padding: 14px 0 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--rp-muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  z-index: 1;
}
.sb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
  gap: 2px;
}
.sb-cell {
  aspect-ratio: 1;
  border: 0; background: transparent;
  border-radius: 8px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 24px;
  transition: transform .1s, background .1s;
}
.sb-cell:hover { background: var(--rp-pink-soft); transform: scale(1.15); }
.sb-glyph {
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  line-height: 1;
}
.sb-empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--rp-muted);
}
.sb-empty-glyph { font-size: 40px; margin-bottom: 8px; }
.sb-empty-hint { margin-top: 4px; font-size: 12px; opacity: .8; }

.sb-foot {
  padding: 10px 20px;
  border-top: 1px solid var(--rp-line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--rp-muted);
}
.sb-foot-hint { opacity: .8; }
.sb-cancel {
  border: 1px solid var(--rp-line);
  background: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  font: inherit; font-size: 13px;
  cursor: pointer;
  color: #3b3f48;
}
.sb-cancel:hover { background: #f2f3f6; }

/* ============ "Create tag" action button (ghost, not a tag) ============ */
.rp-add-btn {
  margin-top: 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  height: 36px;
  background: transparent;
  border: 1.5px dashed #c7cbd2;
  border-radius: 10px;
  color: #5c6070;
  font: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: border-color .15s, color .15s, background .15s;
  align-self: flex-start;
}
.rp-add-btn:hover {
  border-color: var(--rp-green);
  color: var(--rp-green);
  background: rgba(45,184,86,.06);
}
.rp-add-btn svg { flex-shrink: 0; }

/* Grid / cell glyph fallback */
.fi-fallback {
  font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
}
.fi-svg { pointer-events: none; }
.dc-intro {
  max-width: 820px;
  margin: 0 auto;
  padding: 48px 24px 8px;
}
.dc-intro h1 {
  font-size: 30px;
  font-weight: 700;
  margin: 0 0 12px;
  letter-spacing: -0.01em;
}
.dc-intro p {
  color: #5c6070;
  font-size: 15px;
  line-height: 1.55;
  margin: 0 0 8px;
}
.dc-intro .badge {
  display: inline-block;
  background: var(--rp-pink-soft);
  color: var(--rp-pink);
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  margin-right: 6px;
}
.dc-note {
  background: #f7f8fa;
  border: 1px solid var(--rp-line);
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 16px;
  font-size: 13px;
  color: #3b3f48;
  line-height: 1.55;
}
.dc-note b { color: var(--rp-pink); }

body { background: #f0eee9; }
.dc-note ul { margin: 6px 0 0; padding-left: 18px; }
.dc-note li { margin: 3px 0; }
.artboard-frame { width: 820px; height: 980px; background: #eef0f4; overflow: hidden; position: relative; }
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
// Fluent Emoji Flat — comprehensive catalog.
// Each entry: { e: unicode char (fallback), s: file_slug, d: directory name, c: category, t: rus+eng tags }
// SVG: https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/<d>/Flat/<s>_flat.svg

window.ICON_CATEGORIES = [
  { id: 'recent',   name: 'Часто используемые', short: '★' },
  { id: 'smileys',  name: 'Эмоции',             short: '😀' },
  { id: 'people',   name: 'Люди и жесты',       short: '👋' },
  { id: 'nature',   name: 'Животные и природа', short: '🌿' },
  { id: 'food',     name: 'Еда и напитки',      short: '🍷' },
  { id: 'travel',   name: 'Места и транспорт',  short: '🏠' },
  { id: 'activity', name: 'Праздники и спорт',  short: '🎉' },
  { id: 'objects',  name: 'Предметы',           short: '🔑' },
  { id: 'symbols',  name: 'Символы',            short: '❤️' },
  { id: 'flags',    name: 'Флаги',              short: '🏁' },
];

// Helper to build an entry compactly.
const I = (e, d, s, c, t) => ({ e, d, s, c, t });

window.ICONS = [
  // =================== SMILEYS & EMOTION ===================
  I('😀','Grinning face','grinning_face','smileys','улыбка радость smile grinning happy'),
  I('😃','Grinning face with big eyes','grinning_face_with_big_eyes','smileys','улыбка радость smile happy'),
  I('😄','Grinning face with smiling eyes','grinning_face_with_smiling_eyes','smileys','радость смех smile happy laugh'),
  I('😁','Beaming face with smiling eyes','beaming_face_with_smiling_eyes','smileys','улыбка радость beam smile'),
  I('😆','Grinning squinting face','grinning_squinting_face','smileys','смех laugh squinting'),
  I('😅','Grinning face with sweat','grinning_face_with_sweat','smileys','пот смех sweat laugh'),
  I('🤣','Rolling on the floor laughing','rolling_on_the_floor_laughing','smileys','ржу rofl laugh'),

<script type="text/babel" data-presets="react">
// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });

</script>
<script type="text/babel" data-presets="react">// FluentIcon — renders a Microsoft Fluent Emoji Flat SVG via jsDelivr CDN.
// Graceful fallback to the unicode emoji glyph if the SVG 404s.

function FluentIcon({ icon, size = 24, className = '', title }) {
  const [err, setErr] = React.useState(false);
  if (!icon) return null;
  const url = window.iconSvgUrl(icon);
  if (err || !url) {
    return (
      <span
        className={className + ' fi-fallback'}
        style={{ fontSize: size * 0.9, lineHeight: 1, display: 'inline-block' }}
        title={title || icon.s}
      >{icon.e}</span>
    );
  }
  return (
    <img
      src={url}
      alt={icon.e}
      title={title || icon.s}
      width={size}
      height={size}
      loading="lazy"
      draggable={false}
      className={className + ' fi-svg'}
      onError={() => setErr(true)}
      style={{ display: 'block', width: size, height: size, userSelect: 'none' }}
    />
  );
}

// Render by emoji character (lookup + FluentIcon).
function FluentIconByEmoji({ emoji, size = 24, className = '', title }) {
  const icon = window.iconByEmoji(emoji);
  if (!icon) {
    return <span className={className} style={{ fontSize: size * 0.9 }}>{emoji}</span>;
  }
  return <FluentIcon icon={icon} size={size} className={className} title={title} />;
}

window.FluentIcon = FluentIcon;
window.FluentIconByEmoji = FluentIconByEmoji;
</script>
<script type="text/babel" data-presets="react">// The main tags modal — reusable shell. Picker variant is passed in as prop.

// using React.* directly to avoid name collisions when inlined

function Toggle({ on, onChange }) {
  return (
    <button
      className={`rp-toggle ${on ? 'on' : 'off'}`}
      onClick={() => onChange(!on)}
      aria-label={on ? 'Выключить' : 'Включить'}
    >
      <span className="rp-toggle-thumb" />
    </button>
  );
}

function DragHandle() {
  return (
    <div className="rp-drag" aria-hidden>
      <span></span><span></span>
      <span></span><span></span>
      <span></span><span></span>
    </div>
  );
}

function TrashIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M9 3h6M4 6h16M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14M10 11v6M14 11v6"
        stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function CloseIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
    </svg>
  );
}

function HelpIcon() {
  return (
    <svg width="18" height="18" viewBox="0 0 20 20">
      <circle cx="10" cy="10" r="9" fill="none" stroke="#D63384" strokeWidth="1.4"/>
      <text x="10" y="14" textAnchor="middle" fontSize="11" fontWeight="600" fill="#D63384">?</text>
    </svg>
  );
}

function PlusCircle() {
  return (
    <svg width="22" height="22" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="11" fill="#2DB856"/>
      <path d="M12 7v10M7 12h10" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function TagRow({ tag, onToggle, onRename, onDelete, onIconClick, isNew, onCommit }) {
  const inputRef = React.useRef(null);
  React.useEffect(() => {
    if (isNew && inputRef.current) inputRef.current.focus();
  }, [isNew]);

  return (
    <div className="rp-row">
      <DragHandle />
      <div className="rp-input">
        <button
          className={`rp-icon-btn ${!tag.icon ? 'empty' : ''} ${tag.custom ? 'editable' : ''}`}
          onClick={() => tag.custom && onIconClick(tag)}
          disabled={!tag.custom}
          title={tag.custom ? 'Сменить иконку' : 'Системная иконка'}
        >
          {tag.icon ? (
            <FluentIconByEmoji emoji={tag.icon} size={24} className="rp-emoji" />
          ) : (
            <span className="rp-icon-placeholder">?</span>
          )}
        </button>
        <input
          ref={inputRef}
          value={tag.name}
          onChange={(e) => onRename(tag.id, e.target.value)}
          onBlur={() => onCommit && onCommit(tag.id)}
          onKeyDown={(e) => e.key === 'Enter' && e.target.blur()}
          placeholder="Название метки"
        />
      </div>
      <Toggle on={tag.on} onChange={(v) => onToggle(tag.id, v)} />
      <span className="rp-toggle-label">{tag.on ? 'ВКЛ' : 'ВЫКЛ'}</span>
      {tag.custom ? (
        <button className="rp-trash" onClick={() => onDelete(tag.id)} title="Удалить">
          <TrashIcon />
        </button>
      ) : (
        <span className="rp-trash-placeholder" />
      )}
    </div>
  );
}

function CommentRow({ item, onToggle, onRename, onDelete }) {
  return (
    <div className="rp-row">
      <DragHandle />
      <div className="rp-input simple">
        <input
          value={item.text}
          onChange={(e) => onRename(item.id, e.target.value)}
        />
      </div>
      <Toggle on={item.on} onChange={(v) => onToggle(item.id, v)} />
      <span className="rp-toggle-label">{item.on ? 'ВКЛ' : 'ВЫКЛ'}</span>
      <button className="rp-trash" onClick={() => onDelete(item.id)} title="Удалить">
        <TrashIcon />
      </button>
    </div>
  );
}

function TagsModal({ variant, pickerComponent: Picker, initialTags, comments, onChangeTags, onChangeComments }) {
  const [tags, setTags] = React.useState(initialTags);
  const [cms, setCms] = React.useState(comments);
  const [pickerTagId, setPickerTagId] = React.useState(null);
  const [pickerAnchor, setPickerAnchor] = React.useState(null);
  const [recents, setRecents] = React.useState(['⭐','🎂','💎','🎁','🍷','🔒']);

  React.useEffect(() => { onChangeTags && onChangeTags(tags); }, [tags]);
  React.useEffect(() => { onChangeComments && onChangeComments(cms); }, [cms]);

  const addTag = () => {
    const id = 'new-' + Date.now();
    setTags([...tags, { id, name: '', icon: null, on: true, custom: true, isNew: true }]);
  };

  const toggle = (id, v) => setTags(tags.map(t => t.id === id ? { ...t, on: v } : t));
  const rename = (id, name) => setTags(tags.map(t => t.id === id ? { ...t, name } : t));
  const commit = (id) => setTags(tags.map(t => t.id === id ? { ...t, isNew: false } : t));
  const del = (id) => setTags(tags.filter(t => t.id !== id));

  const openPicker = (tag, anchor) => {
    setPickerTagId(tag.id);
    setPickerAnchor(anchor || null);
  };
  const pickIcon = (emoji) => {
    setTags(tags.map(t => t.id === pickerTagId ? { ...t, icon: emoji } : t));
    setRecents([emoji, ...recents.filter(r => r !== emoji)].slice(0, 12));
    setPickerTagId(null);
  };

  const togC = (id, v) => setCms(cms.map(c => c.id === id ? { ...c, on: v } : c));
  const renC = (id, text) => setCms(cms.map(c => c.id === id ? { ...c, text } : c));
  const delC = (id) => setCms(cms.filter(c => c.id !== id));
  const addComment = () => {
    const id = 'c-' + Date.now();
    setCms([...cms, { id, text: '', on: true }]);
  };

  return (
    <div className="rp-modal-shell">
      <div className="rp-modal" onClick={(e) => e.stopPropagation()}>
        <button className="rp-close"><CloseIcon/></button>
        <h2 className="rp-title">РЕДАКТИРОВАНИЕ МЕТОК И БЫСТРЫХ КОММЕНТАРИЕВ</h2>

        <div className="rp-section">
          <div className="rp-section-head">
            <h3>Метки</h3>
            <HelpIcon />
          </div>

          <div className="rp-rows">
            {tags.map(tag => (
              <TagRow
                key={tag.id}
                tag={tag}
                onToggle={toggle}
                onRename={rename}
                onDelete={del}
                onCommit={commit}
                isNew={tag.isNew}
                onIconClick={(t) => {
                  const el = document.querySelector(`[data-tag-id="${t.id}"] .rp-icon-btn`);
                  openPicker(t, el);
                }}
              />
            ))}

            <button className="rp-add-btn" onClick={addTag} type="button">
              <PlusCircle/>
              <span>Создать метку</span>
            </button>
          </div>
        </div>

        <div className="rp-section">
          <div className="rp-section-head">
            <h3>Быстрые комментарии</h3>
            <HelpIcon />
          </div>
          <div className="rp-rows">
            {cms.map(c => (
              <CommentRow key={c.id} item={c} onToggle={togC} onRename={renC} onDelete={delC}/>
            ))}
            <button className="rp-add-btn" onClick={addComment} type="button">
              <PlusCircle/>
              <span>Добавить комментарий</span>
            </button>
          </div>
        </div>
      </div>

      {/* Invisible anchor wrapper for tag rows */}
      <style>{`
        [data-tag-id] { display: contents; }
      `}</style>

      {pickerTagId && (
        <Picker
          recents={recents}
          onPick={pickIcon}
          onClose={() => setPickerTagId(null)}
          anchor={pickerAnchor}
          currentTag={tags.find(t => t.id === pickerTagId)}
        />
      )}
    </div>
  );
}

window.TagsModal = TagsModal;
window.HelpIcon = HelpIcon;
window.PlusCircle = PlusCircle;
</script>
<script type="text/babel" data-presets="react">// Variant A — Popover anchored to the tag row's icon button.
// Compact, fast, doesn't obscure the list.



function PickerPopover({ recents, onPick, onClose, anchor }) {
  const [cat, setCat] = React.useState('recent');
  const [q, setQ] = React.useState('');
  const ref = React.useRef(null);

  React.useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener('mousedown', onDoc), 0);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const filtered = React.useMemo(() => {
    if (q.trim()) {
      const needle = q.toLowerCase().trim();
      return window.ICONS.filter(i => i.t.toLowerCase().includes(needle) || i.e.includes(needle));
    }
    if (cat === 'recent') {
      return recents.map(e => window.ICONS.find(i => i.e === e)).filter(Boolean);
    }
    return window.ICONS.filter(i => i.c === cat);
  }, [cat, q, recents]);

  // Position near anchor
  const style = {};
  if (anchor) {
    const r = anchor.getBoundingClientRect();
    const shell = document.querySelector('.rp-modal-shell').getBoundingClientRect();
    style.position = 'absolute';
    style.top = (r.bottom - shell.top + 8) + 'px';
    style.left = Math.max(16, r.left - shell.left - 8) + 'px';
  }

  return (
    <div className="picker-pop" ref={ref} style={style}>
      <div className="pop-head">
        <input
          autoFocus
          className="pop-search"
          placeholder="Поиск иконки…"
          value={q}
          onChange={(e) => setQ(e.target.value)}
        />
        <button
          type="button"
          className="pop-close"
          onClick={onClose}
          aria-label="Закрыть"
          title="Закрыть"
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
            <path d="M3 3l8 8M11 3l-8 8" />
          </svg>
        </button>
      </div>
      {!q.trim() && (
        <div className="pop-tabs">
          {window.ICON_CATEGORIES.map(c => (
            <button
              key={c.id}
              className={`pop-tab ${cat === c.id ? 'active' : ''}`}
              onClick={() => setCat(c.id)}
              title={c.name}
            >
              <span className="pop-tab-glyph">{c.short}</span>
            </button>
          ))}
        </div>
      )}
      <div className="pop-grid-wrap">
        {filtered.length === 0 ? (
          <div className="pop-empty">Ничего не найдено</div>
        ) : (
          <div className="pop-grid">
            {filtered.map((i, idx) => (
              <button key={i.e + idx} className="pop-cell" onClick={() => onPick(i.e)} title={i.s}>
                <FluentIcon icon={i} size={24} />
              </button>
            ))}
          </div>
        )}
      </div>
      <div className="pop-foot">
        <span>{filtered.length} иконок</span>
        <span className="pop-hint">Fluent Emoji Flat · Microsoft</span>
      </div>
    </div>
  );
}

window.PickerPopover = PickerPopover;
</script>
<script type="text/babel" data-presets="react">// Variant B — Second modal overlay with top tabs.
// Familiar Notion/Telegram-style picker. Bigger canvas, easier to browse.



function PickerTabs({ recents, onPick, onClose, currentTag }) {
  const [cat, setCat] = React.useState('recent');
  const [q, setQ] = React.useState('');
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    const onKey = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const sections = React.useMemo(() => {
    if (q.trim()) {
      const needle = q.toLowerCase().trim();
      const list = window.ICONS.filter(i => i.t.toLowerCase().includes(needle));
      return [{ id: 'search', name: `Результаты поиска (${list.length})`, items: list }];
    }
    if (cat === 'recent') {
      const list = recents.map(e => window.ICONS.find(i => i.e === e)).filter(Boolean);
      return [{ id: 'recent', name: 'Часто используемые', items: list }];
    }
    const found = window.ICON_CATEGORIES.find(c => c.id === cat);
    return [{ id: cat, name: found.name, items: window.ICONS.filter(i => i.c === cat) }];
  }, [cat, q, recents]);

  const total = sections.reduce((a, s) => a + s.items.length, 0);

  return (
    <div className="picker-tabs-backdrop" onClick={onClose}>
      <div className="picker-tabs" onClick={(e) => e.stopPropagation()}>
        <div className="tabs-head">
          <div className="tabs-title">
            <span>Выбор иконки</span>
            {currentTag?.name && <span className="tabs-subtitle">· для «{currentTag.name}»</span>}
          </div>
          <button className="tabs-close" onClick={onClose}>×</button>
        </div>

        <div className="tabs-search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#9BA0AA" strokeWidth="1.8"/>
            <path d="M20 20l-3.5-3.5" stroke="#9BA0AA" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
          <input
            autoFocus
            placeholder="Поиск — «торт», «vip», «рождения»…"
            value={q}
            onChange={(e) => setQ(e.target.value)}
          />
          {q && <button className="tabs-clear" onClick={() => setQ('')}>×</button>}
        </div>

        {!q.trim() && (
          <div className="tabs-tabs">
            {window.ICON_CATEGORIES.map(c => (
              <button
                key={c.id}
                className={`tabs-tab ${cat === c.id ? 'active' : ''}`}
                onClick={() => setCat(c.id)}
              >
                <span className="tabs-tab-glyph">{c.short}</span>
                <span className="tabs-tab-name">{c.name}</span>
              </button>
            ))}
          </div>
        )}

        <div className="tabs-scroll" ref={scrollRef}>
          {sections.map(s => (
            <div key={s.id} className="tabs-section">
              <div className="tabs-section-head">{s.name}</div>
              {s.items.length === 0 ? (
                <div className="tabs-empty">Ничего не найдено. Попробуйте другой запрос.</div>
              ) : (
                <div className="tabs-grid">
                  {s.items.map((i, idx) => (
                    <button key={i.e + idx} className="tabs-cell" onClick={() => onPick(i.e)} title={i.s}>
                      <FluentIcon icon={i} size={30} />
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>

        <div className="tabs-foot">
          <span>Иконок доступно: <b>{window.ICONS.length}</b></span>
          <span className="tabs-foot-hint">Fluent Emoji Flat · Microsoft · MIT</span>
        </div>
      </div>
    </div>
  );
}

window.PickerTabs = PickerTabs;
</script>
<script type="text/babel" data-presets="react">// Variant C — Sidebar layout à la Slack/Figma.
// Categories pinned on the left; continuous scroll with sticky headers on the right.



function PickerSidebar({ recents, onPick, onClose, currentTag }) {
  const [q, setQ] = React.useState('');
  const [activeCat, setActiveCat] = React.useState('recent');
  const scrollRef = React.useRef(null);
  const sectionRefs = React.useRef({});

  const grouped = React.useMemo(() => {
    const recentItems = recents.map(e => window.ICONS.find(i => i.e === e)).filter(Boolean);
    const groups = window.ICON_CATEGORIES.map(c => {
      if (c.id === 'recent') return { ...c, items: recentItems };
      return { ...c, items: window.ICONS.filter(i => i.c === c.id) };
    }).filter(g => g.items.length > 0);
    return groups;
  }, [recents]);

  const searchResults = React.useMemo(() => {
    if (!q.trim()) return null;
    const needle = q.toLowerCase().trim();
    return window.ICONS.filter(i => i.t.toLowerCase().includes(needle));
  }, [q]);

  React.useEffect(() => {
    const onKey = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const scrollToCat = (id) => {
    const el = sectionRefs.current[id];
    if (el && scrollRef.current) {
      scrollRef.current.scrollTo({ top: el.offsetTop - 8, behavior: 'smooth' });
      setActiveCat(id);
    }
  };

  // Observe scroll to highlight active sidebar entry
  React.useEffect(() => {
    const onScroll = () => {
      const top = scrollRef.current?.scrollTop ?? 0;
      let best = grouped[0]?.id;
      grouped.forEach(g => {
        const el = sectionRefs.current[g.id];
        if (el && el.offsetTop - 40 <= top) best = g.id;
      });
      setActiveCat(best);
    };
    const el = scrollRef.current;
    el?.addEventListener('scroll', onScroll);
    return () => el?.removeEventListener('scroll', onScroll);
  }, [grouped]);

  return (
    <div className="picker-sidebar-backdrop" onClick={onClose}>
      <div className="picker-sidebar" onClick={(e) => e.stopPropagation()}>
        <div className="sb-head">
          <div className="sb-title">
            Выбор иконки для метки
            {currentTag?.name && <span> «{currentTag.name}»</span>}
          </div>
          <button className="sb-close" onClick={onClose}>×</button>
        </div>

        <div className="sb-body">
          <aside className="sb-nav">
            <div className="sb-search">
              <input
                placeholder="Поиск…"
                value={q}
                onChange={(e) => setQ(e.target.value)}
              />
            </div>
            <div className="sb-nav-list">
              {grouped.map(g => (
                <button
                  key={g.id}
                  className={`sb-nav-item ${activeCat === g.id && !q ? 'active' : ''}`}
                  onClick={() => scrollToCat(g.id)}
                >
                  <span className="sb-nav-glyph">{g.short}</span>
                  <span className="sb-nav-name">{g.name}</span>
                  <span className="sb-nav-count">{g.items.length}</span>
                </button>
              ))}
            </div>
          </aside>

          <main className="sb-main" ref={scrollRef}>
            {searchResults ? (
              <div className="sb-section">
                <div className="sb-section-head sticky">
                  Результаты поиска · {searchResults.length}
                </div>
                {searchResults.length === 0 ? (
                  <div className="sb-empty">
                    <div className="sb-empty-glyph">🔎</div>
                    <div>По запросу «{q}» ничего не найдено</div>
                    <div className="sb-empty-hint">Попробуйте синоним или другой язык</div>
                  </div>
                ) : (
                  <div className="sb-grid">
                    {searchResults.map((i, idx) => (
                      <button key={i.e + idx} className="sb-cell" onClick={() => onPick(i.e)} title={i.t}>
                        <FluentIcon icon={i} size={30} />
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              grouped.map(g => (
                <div
                  key={g.id}
                  className="sb-section"
                  ref={el => sectionRefs.current[g.id] = el}
                >
                  <div className="sb-section-head sticky">{g.name}</div>
                  <div className="sb-grid">
                    {g.items.map((i, idx) => (
                      <button key={i.e + idx} className="sb-cell" onClick={() => onPick(i.e)} title={i.t}>
                        <FluentIcon icon={i} size={30} />
                      </button>
                    ))}
                  </div>
                </div>
              ))
            )}
          </main>
        </div>

        <div className="sb-foot">
          <span className="sb-foot-hint">Fluent Emoji Flat · Microsoft · {window.ICONS.length} иконок</span>
          <button className="sb-cancel" onClick={onClose}>Отмена</button>
        </div>
      </div>
    </div>
  );
}

window.PickerSidebar = PickerSidebar;
</script>
